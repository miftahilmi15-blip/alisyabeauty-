<!-- HEADER SHOP -->
<header class="header-shop">
  <h1>Beauty Shop</h1>
  <input type="search" id="search-bar" placeholder="Cari produk...">
  <button class="cart-icon">
    <i class="fa fa-shopping-cart"></i>
    <span id="cart-count">0</span>
  </button>
</header>

<!-- KATEGORI PRODUK -->
<section class="kategori-produk">
  <h2>Filter Kategori</h2>
  <ul>
    <li><a href="#" data-kategori="Hair Care">Hair Care</a></li>
    <li><a href="#" data-kategori="Face Care">Face Care</a></li>
    <li><a href="#" data-kategori="Body Care">Body Care</a></li>
    <li><a href="#" data-kategori="Spa Essentials">Spa Essentials</a></li>
    <li><a href="#" data-kategori="Herbal / Halal Treatment">Herbal / Halal Treatment</a></li>
  </ul>
</section>

<!-- PRODUCT GRID (UTAMA) -->
<section class="product-grid">
  <h2>Produk</h2>
  <div class="grid-container">
    <!-- produk akan dirender disini -->
  </div>
</section>

<!-- PROMO / DISKON BANNER -->
<section class="promo-banner">
  <h2>Special Discount 20% Luxury Hair Care</h2>
  <p>Belanja sekarang dan dapatkan diskon 20%!</p>
</section>

<!-- BEST SELLER SECTION -->
<section class="best-seller">
  <h2>Produk Paling Laris</h2>
  <div class="grid-container">
    <!-- produk paling laris akan dirender disini -->
  </div>
</section>

<!-- CART SYSTEM (BASIC) -->
<section class="cart-system">
  <h2>Keranjang</h2>
  <ul id="cart-list">
    <!-- produk yang dipilih akan dirender disini -->
  </ul>
  <p id="cart-total">Total: Rp 0</p>
  <button id="checkout-btn">Checkout</button>
</section>

<!-- CHECKOUT (OPTIONAL FLOW) -->
<section class="checkout" style="display: none;">
  <h2>Checkout</h2>
  <form id="checkout-form">
    <label for="nama">Nama:</label>
    <input type="text" id="nama" name="nama">
    <label for="alamat">Alamat:</label>
    <input type="text" id="alamat" name="alamat">
    <label for="nomor-whatsapp">Nomor WhatsApp:</label>
    <input type="text" id="nomor-whatsapp" name="nomor-whatsapp">
    <label for="metode-pembayaran">Metode Pembayaran:</label>
    <select id="metode-pembayaran" name="metode-pembayaran">
      <option value="manual">Manual</option>
      <option value="cod">COD</option>
      <option value="transfer">Transfer</option>
    </select>
    <button id="submit-checkout">Submit</button>
  </form>
</section>
