<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alisya Beauty</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="tab-switch">
            <button class="tab-button active" id="booking-tab">Booking Baru</button>
            <button class="tab-button" id="history-tab">Riwayat Booking</button>
        </div>
        <div class="tab-content">
            <div class="booking-form" id="booking-form">
                <h2>Form Booking</h2>
                <form id="booking-form-submit">
                    <input type="text" id="customerName" placeholder="Nama">
                    <input type="text" id="whatsapp" placeholder="WhatsApp">
                    <input type="email" id="email" placeholder="Email">
                    <select id="service" placeholder="Layanan">
                        <!-- option akan diisi dari Firebase -->
                    </select>
                    <input type="date" id="bookingDate" placeholder="Tanggal">
                    <input type="time" id="bookingTime" placeholder="Jam">
                    <textarea id="notes" placeholder="Catatan"></textarea>
                    <button id="booking-button">Booking Sekarang</button>
                </form>
            </div>
            <div class="booking-history" id="booking-history">
                <h2>Riwayat Booking</h2>
                <div class="filter-status">
                    <button class="filter-button active" id="all-status">ALL</button>
                    <button class="filter-button" id="pending-status">PENDING</button>
                    <button class="filter-button" id="confirmed-status">CONFIRMED</button>
                    <button class="filter-button" id="completed-status">COMPLETED</button>
                    <button class="filter-button" id="cancelled-status">CANCELLED</button>
                </div>
                <div class="booking-list" id="booking-list">
                    <!-- daftar booking akan diisi dari Firebase -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.firebase.com/libs/firebase/9.1.3/firebase-app.js"></script>
    <script src="https://cdn.firebase.com/libs/firebase/9.1.3/firebase-database.js"></script>
    <script src="https://cdn.firebase.com/libs/firebase/9.1.3/firebase-auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
